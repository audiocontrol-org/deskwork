# Audit-barrage model battery — project override for the deskwork monorepo.
#
# Overrides the plugin default at:
#   plugins/stack-control/templates/audit-barrage-config.yaml
#
# FRONTIER-ONLY cross-family fleet (operator decision 2026-06-16) for whole-feature
# ("full-implementation") barrages. Only frontier, large-context models are pinned —
# older/smaller models choke on a large whole-feature payload (proven 2026-06-16: a
# 4-lane run including gpt-5.4 and claude-sonnet-4-6 produced 0 output from BOTH older
# lanes on a ~186 KB payload, while gpt-5.5 and opus completed). Do NOT add a
# non-frontier lane to a large-scope fleet; it silently no-ops and degrades the run.
#
#   codex  / gpt-5.5   (OpenAI/codex family — frontier)
#   claude / sonnet-4.6 (Anthropic/claude family — frontier; swapped from opus
#                        2026-06-19 after opus timed out on per-phase payloads —
#                        see the per-lane note below)
#
# Two frontier lanes, one per family = cross-family genetic diversity; 2-of-2
# AGREEMENT ACROSS families is the strong HIGH-confidence signal a same-family fleet
# cannot give. Byte envelopes (fleet-knowledge.yaml) are sized above the whole-feature
# payload for these large-context lanes — operator-directed, not a floated default.
#
# Timeout derivation (per lane): effective timeout = max(floor, ceil(secs_per_kb x
# payload_KB)). claude uses stream-json + stdout liveness (text mode emits no stdout
# pulse until completion); codex uses stderr liveness.
#
# Re-adding a second lane per family (e.g. for redundancy) is fine ONLY with another
# FRONTIER, large-context model — never an older model that cannot hold the payload.
# gemini stays DISABLED (94.1% run-failure rate, 2026-06-01 cycle).
#
models:
  - name: codex
    binary: codex
    model: gpt-5.5
    args_template: "exec -m {{model}} --sandbox read-only {{prompt-stdin}}"
    readonly_enforcement: "--sandbox read-only"
    output_mode: text
    liveness_signal: stderr
    # 60s was too tight: codex (gpt-5.5) reasons silently on a real ~17KB audit
    # payload for >60s before its first stderr pulse, tripping killed-no-liveness
    # well before the 300s timeout (observed 2026-06-16, 025 phase-1 govern). Widen
    # to the timeout floor so the watchdog only fires on a genuine hang, not on
    # codex's silent-reasoning latency.
    liveness_window_seconds: 300
    timeout_floor_seconds: 300
    timeout_secs_per_kb: 7

  - name: claude
    binary: claude
    # opus -> sonnet + no-grounding (operator decisions 2026-06-19). TWO changes,
    # diagnosed empirically against 027 per-phase payloads:
    #  (1) opus -> sonnet: opus TIMED OUT (027 Phase 2, 24 KB -> 311s budget, killed
    #      at 311s) and Phase 3 (14 KB -> 300s, killed at 300s). sonnet-4.6 is
    #      current-gen frontier with large context.
    #  (2) DROP agentic file-grounding (`--permission-mode plan` -> `--disallowedTools`
    #      via readonly_enforcement). The wall-clock killer was NOT token throughput:
    #      `--permission-mode plan` let the model READ files to ground findings, and
    #      the audit prompt instructs grounding, so the lane ran an unbounded
    #      read/grep tool-loop that consumed the WHOLE budget (opus AND sonnet both
    #      hit their cap). Disabling tools makes the lane a single text-only pass over
    #      the payload (which already contains the diff under audit): measured
    #      197-233s on the 14 KB Phase-3 payload — it COMPLETES with comfortable
    #      margin and still surfaces real findings (it independently flagged a HIGH the
    #      degraded Phase-3 govern missed). codex remains the deep file-grounding lane;
    #      claude is now the fast cross-family text-diff lane. The residual ~200s is
    #      the model's extended thinking (inherent to a frontier audit; no clean CLI
    #      knob to cut it without a non-frontier model).
    #  Floor raised 300 -> 420s purely for kill-cap headroom on larger phases — a
    #  successful run still completes ~200-233s, so this does not slow good runs.
    #  CAVEAT (whole-feature barrages): claude-sonnet-4-6 was observed to produce 0
    #  output on a ~186 KB whole-feature payload (2026-06-16). Per-phase governance
    #  never sends payloads that large (FR-006a -> boundary-too-large); if a
    #  whole-feature barrage is ever run, revisit the lane for that payload size.
    model: sonnet
    args_template: "-p --model {{model}} --output-format stream-json --verbose {{prompt-stdin}}"
    # No-tools = readonly by construction (denies Write/Edit) AND no grounding loop
    # (denies Read/Grep/Glob/Bash/Task/web). Comma-joined single token so it survives
    # the harness's whitespace split (spawn-cli injects this fragment into argv).
    readonly_enforcement: "--disallowedTools Bash,Read,Grep,Glob,Edit,Write,WebFetch,WebSearch,Task,NotebookRead,NotebookEdit"
    output_mode: stream-json
    liveness_signal: stdout
    liveness_window_seconds: 60
    timeout_floor_seconds: 420
    timeout_secs_per_kb: 13
