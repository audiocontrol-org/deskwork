# Audit-barrage model battery — defaults shipped by the stack-control plugin.
#
# Project-overridable at:
#   .stack-control/audit-barrage-config.yaml
#
# Each entry registers one CLI lane to fire as part of the audit barrage. The
# orchestrator runs all configured lanes in parallel against the rendered
# audit prompt; per-model output is captured under
# `.stack-control/audit-runs/<timestamp>-<feature>/`.
#
# Config grammar v2 (specs/014-audit-barrage-reliability). Normative
# contract: specs/014-audit-barrage-reliability/contracts/barrage-config-schema.md.
# A lane missing the v2 fields is refused at load with a migration message
# (FR-011) — copy a lane from this file and adjust.
#
# Per-lane fields:
#   name                    — operator-visible identifier; per-model filename
#                             stem in the run dir; the `--models` filter key.
#   binary                  — path or PATH-resolvable name of the CLI to spawn.
#   model                   — REQUIRED explicit model pin (alias or id). No
#                             spawn floats on the user's ambient default
#                             (FR-001). Pin the ALIAS class where the CLI
#                             supports one — an alias tracks point releases;
#                             a dated id rots.
#   args_template           — whitespace-delimited argv template; MUST contain
#                             `{{model}}` AND exactly one of `{{prompt}}`
#                             (argv substitution) / `{{prompt-stdin}}` (stdin
#                             delivery — bypasses the OS ARG_MAX limit; the
#                             default for every shipped lane).
#   readonly_enforcement    — REQUIRED. The CLI fragment that makes the spawn
#                             MECHANICALLY read-only (injected into argv
#                             before the prompt placeholder when the template
#                             doesn't already carry it), or the explicit
#                             sentinel `none` — the lane then runs loudly
#                             marked write-UNENFORCED at fire time, in run
#                             artifacts, and at synthesis (FR-003/FR-004).
#                             Fragments ship only after passing the hostile
#                             write-probe (scripts/probe-readonly-spawn.sh) —
#                             never assumed.
#   output_mode             — text | stream-json. stream-json lanes get their
#                             final report extracted from the terminal result
#                             event (the per-model markdown artifact contract
#                             survives the wire-format change, FR-010) plus a
#                             forensic <model>.events.ndjson capture.
#   liveness_signal         — stdout | stderr | none. Which stream carries the
#                             sign-of-life pulse for the watchdog (FR-008).
#                             MUST be a signal a healthy run actually produces
#                             (measured 2026-06-10: claude text mode emits 0
#                             stdout bytes until completion — its pulse only
#                             exists in stream-json; codex chatters on stderr).
#                             `none` → liveness unmonitored, watchdog disarmed.
#   liveness_window_seconds — staleness threshold; required when the signal is
#                             monitored. A spawn with no pulse inside the
#                             window is killed (terminal state
#                             killed-no-liveness) instead of waiting out the
#                             full timeout. REFUSED on a `liveness_signal:
#                             none` lane — an unmonitored lane has no window
#                             to honor (AUDIT-20260611-14).
#   timeout_floor_seconds + timeout_secs_per_kb
#                           — derivation pair (FR-002): effective timeout =
#                             max(floor, ceil(secs_per_kb × payload_KB)) where
#                             payload = rendered PROMPT.md bytes. Calibrated
#                             2026-06-10 on a 69 KB payload (includes ~1.5×
#                             margin over observed wall time):
#                               claude/opus  586 s observed → 13 s/KB
#                               claude/fable 669–750 s      → 17 s/KB
#                               codex        123–290 s      → 7 s/KB
#   timeout_seconds         — optional explicit operator override; displaces
#                             derivation and is recorded as `override` in the
#                             run artifacts.
#
# Thoroughness override profile for the claude lane (operator choice): pin
# `model: fable` with `timeout_secs_per_kb: 17` — most thorough in the
# 2026-06-10 experiment, at correspondingly higher latency. The shipped
# default pins `opus` (near-fable quality at 586 s vs 669–750 s). haiku is
# excluded (zero verification depth).
#
# sonnet (specs/015 US5 / FR-011 / D8) — PROMOTED TO DEFAULT FLEET 2026-06-12:
# sonnet was excluded on the 69 KB whole-feature unit (off-task + 2226 s, and a
# read-only violation). Both disqualifiers are coupled to payload size +
# enforcement — the exact levers specs/015 moves: the per-phase unit (`govern
# --phase`) shrinks the payload and `--permission-mode plan` makes the spawn
# mechanically read-only.
# Live calibration 2026-06-12 (specs/015 quickstart-results.md § US5) met all three
# FR-011 bars on a 12.4 KB per-phase payload — latency 224 s (< 300 s derived
# timeout; ~10x under the 2226 s big-unit disqualifier), 4 file:line-anchored
# depth-findings (one corroborating an opus finding), 4 tool calls + zero repo
# mutations (read-only held). Operator decision (2026-06-12): promote to the DEFAULT
# fleet now — three models (opus + codex + sonnet) restore cross-model genetic
# diversity, and live field-testing across many real change sets is the broader
# sample (rather than gating promotion on more pre-promotion calibration runs). The
# active lane is in `models:` below. Watch latency on larger per-phase units: the
# 13 s/KB slope hits the 300 s floor near ~23 KB; a unit beyond that derives a
# proportionally larger budget (timeout-derivation is linear by design).

models:
  - name: claude
    binary: claude
    model: opus
    # No-grounding (specs/029 US1 / TASK-288): `--permission-mode plan` let the
    # model READ files to ground findings, and the audit prompt instructs
    # grounding, so the lane ran an unbounded read/grep tool-loop that consumed
    # the whole budget. Dropping it (and denying tools via readonly_enforcement)
    # makes the lane a single text-only pass over the payload (which already
    # contains the diff under audit) — measured 167-233s on 14-24KB no-grounding
    # payloads. codex remains the deep file-grounding lane; claude/sonnet are the
    # fast cross-family text-diff lanes.
    args_template: "-p --model {{model}} --output-format stream-json --verbose {{prompt-stdin}}"
    # No-tools = readonly by construction (denies Write/Edit) AND no grounding
    # loop (denies Read/Grep/Glob/Bash/Task/web). Comma-joined single token so it
    # survives the harness's whitespace split (spawn-cli injects it into argv).
    readonly_enforcement: "--disallowedTools Bash,Read,Grep,Glob,Edit,Write,WebFetch,WebSearch,Task,NotebookRead,NotebookEdit"
    output_mode: stream-json
    liveness_signal: stdout
    liveness_window_seconds: 60
    # Floor raised 300 -> 420 for kill-cap headroom on larger phases; a
    # successful no-grounding run still completes ~200-233s, so this does not
    # slow good runs (FR-002).
    timeout_floor_seconds: 420
    timeout_secs_per_kb: 13
  - name: codex
    binary: codex
    model: gpt-5.5
    # Reasoning-summary liveness (specs/029 US1 / TASK-145): codex reasons
    # silently for >60s on a real per-phase payload before its first stderr
    # pulse, tripping killed-no-liveness on a tight window. model_reasoning_
    # summary="detailed" makes codex emit reasoning summaries to stderr DURING
    # reasoning, so the watchdog gets genuine pulses inside the tight 60s window
    # instead of widening the window blindly (FR-003).
    args_template: "exec -m {{model}} -c model_reasoning_summary=\"detailed\" --sandbox read-only {{prompt-stdin}}"
    readonly_enforcement: "--sandbox read-only"
    output_mode: text
    liveness_signal: stderr
    liveness_window_seconds: 60
    timeout_floor_seconds: 300
    timeout_secs_per_kb: 7
  # sonnet — PROMOTED to the default fleet 2026-06-12 (operator decision; calibration
  # evidence in specs/015 quickstart-results.md § US5). Third lane = cross-model
  # diversity at lower cost; under field evaluation across change sets.
  - name: sonnet
    binary: claude
    model: claude-sonnet-4-6
    # No-grounding (specs/029 US1 / TASK-288) — same as the claude/opus lane:
    # drop `--permission-mode plan` + deny tools so the lane is a single
    # text-only read-only pass over the payload, not an unbounded grounding loop.
    args_template: "-p --model {{model}} --output-format stream-json --verbose {{prompt-stdin}}"
    readonly_enforcement: "--disallowedTools Bash,Read,Grep,Glob,Edit,Write,WebFetch,WebSearch,Task,NotebookRead,NotebookEdit"
    output_mode: stream-json
    liveness_signal: stdout
    liveness_window_seconds: 60
    timeout_floor_seconds: 420
    timeout_secs_per_kb: 13
  # gemini — DISABLED (commented out). gemini-cli was failing 94.1% of runs
  # (16 of 17 across the graphical-entries Phase 0 audit cycle) on cascading
  # ClassifierStrategy JSON-routing failures + quota exhaustion; re-enable
  # when upstream stabilizes. When re-enabling: keep readonly_enforcement at
  # `none` until the lane passes scripts/probe-readonly-spawn.sh (the lane
  # then runs loudly marked write-unenforced), and pin the model explicitly.
  # - name: gemini
  #   binary: gemini
  #   model: gemini-2.5-pro
  #   args_template: "-m {{model}} {{prompt-stdin}}"
  #   readonly_enforcement: none
  #   output_mode: text
  #   liveness_signal: none
  #   timeout_floor_seconds: 300
  #   timeout_secs_per_kb: 7
