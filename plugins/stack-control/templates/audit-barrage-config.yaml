# Audit-barrage model battery — defaults shipped by the dw-lifecycle plugin.
#
# Project-overridable at:
#   .stack-control/audit-barrage-config.yaml
#
# Each entry registers one CLI to fire as part of the audit barrage. The
# orchestrator runs all configured entries in parallel against the
# rendered audit prompt; per-model output is captured under
# `.stack-control/audit-runs/<timestamp>-<feature>/`.
#
# Per-entry fields:
#   name              — operator-visible identifier; used as the per-model
#                       filename stem in the run dir and to filter via the
#                       `--models` flag.
#   binary            — path or PATH-resolvable name of the CLI to spawn.
#   args_template     — whitespace-delimited argv template; MUST contain
#                       EITHER the literal `{{prompt}}` placeholder
#                       (argv substitution) OR the `{{prompt-stdin}}`
#                       placeholder (stdin delivery — bypasses the OS
#                       ARG_MAX limit, default since v0.37.0). The
#                       spawn helper picks the delivery path off the
#                       placeholder; the two are mutually exclusive
#                       per entry.
#   timeout_seconds   — wall-clock budget; on expiry the subprocess is
#                       sent SIGTERM, then SIGKILL after a 5s grace.
#
# Default invocation patterns mirror the live-probed contracts captured
# in docs/1.0/001-IN-PROGRESS/scope-discovery/audit-barrage-cli-notes.md.
#
# Why {{prompt-stdin}} is the default (per #397): the audit prompt
# embeds the full feature diff; on a fresh scope-discovery opt-in the
# bootstrap range defaults to HEAD~10, which on most branches exceeds
# the per-arg OS limit (~256KB on macOS, ~128KB MAX_ARG_STRLEN on
# Linux). The argv path fails with spawn E2BIG; the stdin path is
# unbounded. Adopters who previously customized to "-p {{prompt}}" /
# "exec {{prompt}}" / "{{prompt}}" must migrate — see MIGRATING.md.

models:
  - name: claude
    binary: claude
    args_template: "-p {{prompt-stdin}}"
    timeout_seconds: 300
  - name: codex
    binary: codex
    args_template: "exec {{prompt-stdin}}"
    timeout_seconds: 300
  - name: gemini
    binary: gemini
    args_template: "{{prompt-stdin}}"
    timeout_seconds: 300
