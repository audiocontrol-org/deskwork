# Audit-barrage model battery — override for the design-control nested
# installation (`plugins/design-control`).
#
# This installation pins an explicit two-lane default fleet:
#   - codex / gpt-5.5
#   - sonnet / claude-sonnet-4-6
#
# Rationale:
# - design-control's constitution now requires per-phase governance before later
#   phases proceed, so the fleet must be a durable local policy, not whatever
#   ambient defaults happen to be configured in each CLI.
# - the prior local override was pre-v2 and did not pin explicit models, which
#   defeats the "persistent set of models" requirement and risks loader refusal
#   as the barrage config contract evolves.
# - opus is intentionally disabled here: current operator usage pressure makes
#   the heavier Claude lane a poor default, and sonnet is materially faster on
#   the smaller per-phase payloads this installation now requires.
# - gemini remains disabled here until its CLI reliability and quota floor are
#   restored; see the inherited notes below.
#
# Disabled gemini effective 2026-06-01 — gemini-cli was failing 94.1% of runs
# (16 of 17 across the graphical-entries Phase 0 audit cycle) on two cascading
# error modes: (1) ClassifierStrategy JSON-routing failures in
# @google/gemini-cli-core/.../baseLlmClient.js#generateJson (retry exhaustion
# on empty/unparsable JSON); (2) "exhausted your capacity on this model" API
# quota errors after the routing failure. Re-enable only after sustained
# upstream reliability and quota.
#
# The explicit timeout overrides are retained from the earlier design-control
# nested-installation override: this installation has already observed claude's
# default 300 s budget timing out on governed payloads, and codex's 600 s
# budget has been stable in practice.

models:
  - name: codex
    binary: codex
    model: gpt-5.5
    args_template: "exec -m {{model}} --sandbox read-only {{prompt-stdin}}"
    readonly_enforcement: "--sandbox read-only"
    output_mode: text
    liveness_signal: stderr
    liveness_window_seconds: 60
    timeout_seconds: 600

  - name: sonnet
    binary: claude
    model: claude-sonnet-4-6
    args_template: "-p --model {{model}} --permission-mode plan --output-format stream-json --verbose {{prompt-stdin}}"
    readonly_enforcement: "--permission-mode plan"
    output_mode: stream-json
    liveness_signal: stdout
    liveness_window_seconds: 60
    timeout_seconds: 900

  # gemini — deliberately disabled in this installation. Re-enable only after
  # verifying CLI reliability, quota stability, and readonly enforcement for the
  # specific account/environment used here.
  # - name: gemini
  #   binary: gemini
  #   model: gemini-2.5-pro
  #   args_template: "-m {{model}} {{prompt-stdin}}"
  #   readonly_enforcement: none
  #   output_mode: text
  #   liveness_signal: none
  #   timeout_floor_seconds: 300
  #   timeout_secs_per_kb: 7
