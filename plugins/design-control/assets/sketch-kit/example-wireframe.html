<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wireframe — Content Dashboard</title>
<link rel="stylesheet" href="sketch-kit.css">
</head>
<!-- Switch the theme by changing the sk-theme-* class:
     sk-theme-marker | sk-theme-blueprint | sk-theme-grayscale -->
<body class="sk sk-theme-grayscale">

<div class="sk-banner"><strong>WIREFRAME</strong> structure &amp; flow only — not a visual design</div>

<div class="sk-shell">

  <header class="sk-header">
    <div class="sk-logo">LOGO</div>
    <h1 class="sk-h1">Content Dashboard</h1>
    <div class="sk-search">search…</div>
    <div class="sk-avatar">you</div>
  </header>

  <nav class="sk-nav">
    <div class="sk-nav-item sk-current">Dashboard</div>
    <div class="sk-nav-item">Calendar</div>
    <div class="sk-nav-item">Review</div>
    <div class="sk-nav-item">Archive</div>
    <div class="sk-nav-item">Settings</div>
  </nav>

  <div class="sk-row sk-stats">
    <div class="sk-card sk-stat"><div class="sk-num">12</div><div class="sk-label">In review</div></div>
    <div class="sk-card sk-stat"><div class="sk-num">4</div><div class="sk-label">Drafting</div></div>
    <div class="sk-card sk-stat"><div class="sk-num">38</div><div class="sk-label">Published</div></div>
  </div>

  <div class="sk-main">
    <section class="sk-card">
      <h2 class="sk-title">Recent entries</h2>
      <div class="sk-listrow"><div class="sk-dot"></div><div class="sk-line sk-line-l"></div></div>
      <div class="sk-listrow"><div class="sk-dot"></div><div class="sk-line sk-line-m"></div></div>
      <div class="sk-listrow"><div class="sk-dot"></div><div class="sk-line sk-line-l"></div></div>
      <div class="sk-listrow"><div class="sk-dot"></div><div class="sk-line sk-line-s"></div></div>
      <div class="sk-actions">
        <div class="sk-btn sk-btn-primary">+ New entry</div>
        <div class="sk-btn">Approve</div>
        <div class="sk-btn">Cancel</div>
      </div>
    </section>

    <section class="sk-card">
      <h2 class="sk-title">Preview</h2>
      <div class="sk-img"><span class="sk-img-label">image</span></div>
      <div class="sk-line sk-line-m"></div>
      <div class="sk-line sk-line-s"></div>
    </section>
  </div>

  <div class="sk-foot">wireframe · sketch-kit · structure &amp; flow only</div>
</div>

</body>
</html>
