<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Synthetic deskwork dashboard mockup fixture for the Annotorious image-annotation spike">
