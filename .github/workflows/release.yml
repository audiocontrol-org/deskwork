name: release

# Triggered by pushing a v* tag. Runs the full test suite + bundle
# verification (same as the PR check), then creates a GitHub release
# with auto-generated notes from commits since the previous tag. The
# release page on GitHub is the consumer-facing record of what changed
# between versions.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the release-notes step can diff against the
          # previous tag.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install + build
        run: npm install

      # --if-present skips workspaces without a 'test' script (plugin
      # shells ship metadata + wrappers + bundles only).
      - name: Run all tests
        run: npm --workspaces --if-present test

      - name: Verify bundles match the tagged source
        run: |
          if ! git diff --exit-code -- plugins/deskwork/bundle/ plugins/deskwork-studio/bundle/ plugins/deskwork-studio/public/dist/; then
            echo "::error::Tagged commit ships stale bundles or dist. Bump the tag, rebuild, and re-tag."
            exit 1
          fi
          # Also assert the studio's client bundles are present in the tag —
          # they MUST ship in the marketplace tarball or the studio's
          # interaction layer 404s for every adopter (the v0.6.0–v0.8.2
          # packaging bug). See `.gitignore` for the load-bearing exception.
          required_dist=(
            plugins/deskwork-studio/public/dist/editorial-review-client.js
            plugins/deskwork-studio/public/dist/editorial-review-editor.js
            plugins/deskwork-studio/public/dist/editorial-studio-client.js
            plugins/deskwork-studio/public/dist/scrapbook-client.js
            plugins/deskwork-studio/public/dist/content-view-client.js
            plugins/deskwork-studio/public/dist/lightbox.js
          )
          for f in "${required_dist[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Required client bundle missing from tag: $f"
              exit 1
            fi
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
