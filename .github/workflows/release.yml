name: release

# Triggered by pushing a v* tag. Runs the full test suite, verifies the
# marketplace.json catalog still resolves to valid plugin paths, then
# creates a GitHub release with auto-generated notes from commits since
# the previous tag. The release page on GitHub is the consumer-facing
# record of what changed between versions.
#
# Phase 26 (v0.9.5+): the vendor-materialization step is gone. Plugin
# shells now first-run-install @deskwork/<pkg>@<version> from npm at
# first invocation; there is no per-tag materialize-and-re-point dance.
# CI does not publish to npm — the operator publishes manually via
# `make publish` from their terminal (CI publish is deferred to 26-CI).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the release-notes step can diff against the
          # previous tag.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm install

      # --if-present skips workspaces without a 'test' script (plugin
      # shells ship metadata + wrappers + source only).
      - name: Run all tests
        run: npm --workspaces --if-present test

      # Regression gate: marketplace.json on main must declare valid
      # plugin paths for every entry. Catches accidental rename / path
      # typos before adopters trip over them. Phase 26 dropped the
      # source.ref pinning, so this no longer asserts ref equality —
      # just that each git-subdir source's `path` resolves to a real
      # directory under the checked-out tag.
      - name: Verify marketplace.json plugin paths
        run: |
          node -e '
            const fs = require("fs");
            const j = JSON.parse(fs.readFileSync(".claude-plugin/marketplace.json", "utf8"));
            const drift = [];
            for (const entry of j.plugins) {
              const s = entry.source;
              if (s && typeof s === "object" && s.source === "git-subdir") {
                if (!s.path) {
                  drift.push(`${entry.name}: git-subdir source missing path`);
                  continue;
                }
                if (!fs.existsSync(s.path)) {
                  drift.push(`${entry.name}: source.path "${s.path}" does not exist in this checkout`);
                }
              }
            }
            if (drift.length) {
              console.error("marketplace.json plugin path verification failed:");
              for (const d of drift) console.error("  " + d);
              process.exit(1);
            }
            console.log("marketplace.json plugin paths verified for " + j.plugins.length + " plugin(s)");
          '

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
