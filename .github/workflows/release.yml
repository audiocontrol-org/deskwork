name: release

# Triggered by pushing a v* tag. Runs the full test suite + bundle
# verification (same as the PR check), then creates a GitHub release
# with auto-generated notes from commits since the previous tag. The
# release page on GitHub is the consumer-facing record of what changed
# between versions.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the release-notes step can diff against the
          # previous tag.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install + build
        run: npm install

      # --if-present skips workspaces without a 'test' script (plugin
      # shells ship metadata + wrappers + bundles only).
      - name: Run all tests
        run: npm --workspaces --if-present test

      # Phase 23c (Path B): the committed `vendor/core` symlinks survive
      # marketplace install as symlinks, but the relative target traverses
      # out of the cached plugin tree (the marketplace copies plugins/<name>/
      # only — not the workspace root). Materialize the symlinks into
      # plain directory copies on the tagged commit so adopters get a
      # self-contained tree. The development branch keeps the symlinks
      # intact; only the tagged release commit ships materialized.
      - name: Materialize vendor/core symlinks
        run: bash scripts/materialize-vendor.sh

      - name: Configure git for tag move
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit materialized vendor + re-point tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git add plugins/deskwork/vendor plugins/deskwork-studio/vendor
          if git diff --cached --quiet; then
            echo "no vendor changes to commit (nothing was a symlink?)"
            exit 1
          fi
          git commit -m "release: materialize vendor/core for ${TAG}"
          git tag -f "${TAG}"
          git push --force origin "refs/tags/${TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
