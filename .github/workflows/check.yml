name: check

# Server-side safety net for local development. On every PR, runs the
# full workspace test suite. Phase 23b (source-shipped re-architecture)
# retired the committed bundles, so there is no longer a bundle-drift
# verification step here.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm install

      # Build dist/ across all workspaces. Tests in @deskwork/cli invoke
      # node_modules/.bin/deskwork via spawnSync, which symlinks to
      # packages/cli/dist/cli.js — without dist, the bin exits non-zero
      # and tests fail with empty stderr. Locally this works because dist
      # is warm from dev work; CI starts cold.
      # Build infrastructure ≠ test infrastructure (which the project
      # rule at .claude/rules/agent-discipline.md forbids in CI). This
      # step is the prerequisite that makes the existing test
      # infrastructure actually function in a cold environment.
      - name: Build workspaces
        run: npm run build

      # --if-present skips workspaces without a 'test' script. Plugin
      # shells (plugins/deskwork, plugins/deskwork-studio) ship metadata
      # + bash wrappers + source only — no tests.
      - name: Run all tests
        run: npm --workspaces --if-present test
