name: check

# Server-side safety net for local development. On every PR, runs the
# full workspace test suite. Phase 23b (source-shipped re-architecture)
# retired the committed bundles, so there is no longer a bundle-drift
# verification step here.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm install

      # --if-present skips workspaces without a 'test' script. Plugin
      # shells (plugins/deskwork, plugins/deskwork-studio) ship metadata
      # + bash wrappers + source only — no tests.
      - name: Run all tests
        run: npm --workspaces --if-present test
