name: check

# Server-side safety net for the pre-commit hook. On every PR, runs the
# full test suite and verifies the committed self-contained bundles are
# in sync with their source — a fresh build against the PR's source
# tree should match what's checked in. If a contributor commits a
# source change without rebuilding (no husky hook installed, or hook
# bypassed), the PR fails here.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-and-verify-bundles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # `npm install` runs the workspace `prepare` hooks, which include
      # the studio and cli build scripts. We capture that as the "fresh
      # build" against the PR's source.
      - name: Install + build (via prepare hooks)
        run: npm install

      - name: Run all tests
        run: npm --workspaces test

      # The committed bundle paths. If `npm install` (which ran prepare
      # → build) produced output that differs from what's checked in,
      # `git diff --exit-code` fails and the PR is flagged with the
      # specific path(s) that drifted.
      - name: Verify bundles are not stale
        run: |
          if ! git diff --exit-code -- packages/cli/bundle/ packages/studio/bundle/; then
            echo "::error::Committed bundles diverge from a fresh build. Run 'npm install' or 'npm --workspaces run build' locally and re-stage the bundle files, then push again."
            exit 1
          fi
